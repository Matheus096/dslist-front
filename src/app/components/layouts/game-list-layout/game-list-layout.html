<!-- Container principal para controlar o que aparece -->
<ng-container *ngIf="games && games.length > 0; else emptyState">
  <ul class="game-list"> 
    <li *ngFor="let game of games" class="game-item">
      <div class="card-container">
        <img class="game-cover" [src]="game.imgUrl" [alt]="game.title">
      </div>
    </li>
  </ul>
</ng-container>

<!-- Template de "Lista Vazia" -->
<ng-template #emptyState>
  <div class="empty-list-wrapper">
    <div class="empty-card">
      <div class="icon-box">🎮</div>
      <h2>Sua biblioteca está vazia</h2>
      <p>Compre algum jogo para ver sua lista de jogos aqui.</p>
      <button class="btn-loja" routerLink="/games-store">Explorar Loja</button>
    </div>
  </div>
</ng-template>

<button class="btn-voltar" (click)="goToHome()">Voltar</button>


<!-- antes era por aqui que era usado o formulário para selecionar a lista de jogos a ser exibida, mas agora esse formulário foi movido para o Navbar,
  já que a seleção da lista de jogos é uma funcionalidade global que afeta várias partes do aplicativo, e não apenas a GameListLayout. 
  Dessa forma, faz mais sentido que essa funcionalidade esteja no Navbar, onde o usuário pode acessá-la facilmente de qualquer página do aplicativo. 
  Além disso, ao mover o formulário para o Navbar, podemos usar o GameStateService para compartilhar o estado da lista selecionada entre os componentes, 
  garantindo que a GameListLayout seja atualizada corretamente sempre que o usuário selecionar uma nova lista no Navbar.
  E agora como essa obtenção de lista está sendo feita no Navbar, posso pegar o ID da lista selecionada tambem do componente game-store-layout, utilizando o GameStateService,
  não ficando dessa forma essa obtenção restrita apenas ao game-list-layout. -->
