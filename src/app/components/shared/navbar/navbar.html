<header class="navbar">
    <a [routerLink]="['/home']" class="logo">DSList</a>

    @if (isFocus) {
        <div class="overlay" (click)="toggleFocus(false, buscaInput)"></div>
    }

    <div class="search-container" [class.focused]="isFocus">
        <input #buscaInput type="text" placeholder="Pesquisar..." (input)="onSearch(buscaInput.value)"
            (focus)="toggleFocus(true)" (blur)="toggleFocus(false, buscaInput)" autocomplete="off">
        <button (click)="onSearch(buscaInput.value)" type="submit"><i class="bi bi-search"></i></button>    
        
        <ul class="search-results" *ngIf="isFocus && (games$ | async) as games">
            @for (game of games; track game.id) {
                <li>
                    <a [routerLink]="['/game_details', game.id, getSlug(game.title)]" (click)="clearSearch(buscaInput)">
                        {{ game.title }}
                    </a>
                </li>
            }
        </ul>
    </div>

    <nav class="nav-links">
        <a style="cursor: pointer;" (click)="goToGamesStore()">Loja</a>
        <a style="cursor: pointer;" (click)="goToGames()">Meus Jogos</a>
        <a style="cursor: pointer;" class="category-btn" [ngClass]="{'active-link': isCategoryMenuOpen}" (click)="toggleCategoryMenu()">Categorias</a>
        <button class="theme-toggle" (click)="toggleTheme()">
            {{ isDark ? '☀️' : '🌙' }}
        </button>
    </nav>

    <div class="overlay-categories" *ngIf="isCategoryMenuOpen" (click)="toggleCategoryMenu()"></div>

    <div class="menu-dropdown" *ngIf="isCategoryMenuOpen">
        <form class="list-options" (change)="onListChange($event)">
            <label style="padding: 5px 2px;">
                <input type="radio" name="preferencia" value="3">
                Todos
            </label><br>
            <label style="padding: 5px 2px;">
                <input type="radio" name="preferencia" value="2">
                Plataforma
            </label><br>
            <label style="padding: 5px 2px;">
                <input type="radio" name="preferencia" value="1">
                Aventura
            </label><br>
            <label style="padding: 5px 2px;">
                <input type="radio" name="preferencia" value="4">
                RPG
            </label>
        </form>
    </div>
    
    <div class="menu-toggle">
        <i class="fa fa-bars"></i>
    </div>
    <button type="button" class="btn btn-danger" (click)="logout()">Deslogar</button>
</header>

<script>
    const menuToggle = document.querySelector('.menu-toggle');
    const navLinks = document.querySelector('.nav-links');

    menuToggle.addEventListener('click', () => {
        navLinks.classList.toggle('active');
    });
</script>
